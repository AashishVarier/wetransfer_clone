service: wetransfer-clone

provider:
  name: aws
  runtime: python3.11
  region: us-east-1
  stage: ${opt:stage, 'dev'}
  environment:
    S3_BUCKET_NAME: ${self:service}-files-${self:provider.stage}
    DYNAMODB_TABLE_NAME: ${self:service}-metadata-${self:provider.stage}
    FILE_EXPIRATION_MINUTES: 2

functions:
  api:
    handler: handler.lambda_handler
    events:
      - http:
          path: /{proxy+}
          method: ANY
          cors: true
    timeout: 30
    memorySize: 256

